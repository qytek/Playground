<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backrooms - 后室</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="game-container">
  <canvas id="game"></canvas>
  <div id="crosshair"></div>
  <div id="ui-layer">
    <div class="hud-row">
      <span>SANITY</span>
      <div class="hud-bar" style="width:140px"><div id="sanity-fill" class="hud-fill" style="width:100%"></div></div>
    </div>
    <div class="hud-row">
      <span>STAMINA</span>
      <div class="hud-bar" style="width:100px"><div id="stamina-fill" class="hud-fill" style="width:100%"></div></div>
    </div>
    <div class="hud-row" style="font-size:10px;color:#666" id="hint-text"></div>
  </div>
  <div id="message-center"></div>
  <div id="title-overlay">
    <h1>BACKROOMS</h1>
    <div class="subtitle">后 室</div>
    <button class="btn" id="start-btn">进 入</button>
    <div class="hint">WASD 移动 · SHIFT 奔跑 · E 喝杏仁水 · 寻找出口</div>
  </div>
</div>

<!-- Load order: dependencies first -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/input.js"></script>
<script src="js/audio.js"></script>
<script src="js/maze.js"></script>
<script src="js/player.js"></script>
<script src="js/entity.js"></script>
<script src="js/renderer.js"></script>
<script src="js/level1.js"></script>
<script src="js/level2.js"></script>
<script src="js/level-manager.js"></script>
<script src="js/main.js"></script>
</body>
</html>
